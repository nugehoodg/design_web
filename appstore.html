<!DOCTYPE html>
<html lang="en" data-theme="corporate">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="favicon.ico">

<title>Fun App</title>

<link href="src/output.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.7"></script>

</head>



    <nav class="navbar p-7 sm:p-10 mx-auto border-b-1" hx-get="navbar_01.html" hx-trigger="load" hx-target="this"></nav>




<!-- page -->
<div class="max-w-5xl mx-auto px-4 py-10">

<h1 class="text-3xl font-bold text-gray-900 mb-8">
Apps
</h1>



<!-- cards -->
<div id="app-container" class="flex flex-col gap-6"></div>



</div>



<!-- template -->
<template id="app-card-template">

<div class="border border-gray-300 rounded-lg overflow-hidden bg-white">

<!-- banner -->
<img class="w-full h-48 object-cover border-b">



<div class="p-5">

<!-- title + button -->
<div class="flex justify-between items-start gap-4">

<h2 class="text-lg font-semibold text-gray-900"></h2>


<a
target="_blank"
class="btn btn-success border border-gray-300 px-3 py-1.5 rounded-md text-sm ">

Download

</a>

</div>



<!-- description -->
<p class="text-gray-600 text-sm mt-2 mb-3"></p>



<!-- tags -->
<div class="flex flex-wrap gap-2 text-xs"></div>

</div>

</div>

</template>



<script>

async function loadApps(){

const response = await fetch("app-project.json")

const apps = await response.json()

const container = document.getElementById("app-container")

const template = document.getElementById("app-card-template")



apps.forEach(app=>{

const card = template.content.cloneNode(true)



card.querySelector("img").src = app.banner



card.querySelector("h2").textContent = app.name



card.querySelector("p").textContent = app.description



const tagContainer = card.querySelector(".flex-wrap")



app.tags.forEach(tag=>{

const tagEl = document.createElement("span")

tagEl.className =
"px-2 py-1 rounded-full border border-gray-300 bg-gray-50 text-gray-700"



tagEl.textContent = tag



tagContainer.appendChild(tagEl)

})



card.querySelector("a").href = app.download



container.appendChild(card)

})

}



loadApps()

</script>



</body>

</html>
